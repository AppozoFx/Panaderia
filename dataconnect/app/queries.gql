# Consultas iniciales - Pan (Gestion de Panaderia)
# Se amplia por modulo en cada fase (ver docs/11-Plan-de-Implementacion-Firebase.md, Fase 5).

# Configuracion del negocio (fila unica, ver src/lib/dataconnect/constants.ts).
# No esta ligada a auth.uid porque es compartida por todo el negocio, no por usuario.
# La escritura se restringe a administradores en el cliente (ver src/app/configuracion/page.tsx);
# falta granularidad por rol a nivel de conector (pendiente, ver docs/04-Modelo-de-Datos.md).
query GetBusinessConfig($id: UUID!)
@auth(level: USER, insecureReason: "Configuracion compartida del negocio; solo lectura para cualquier usuario logueado.") {
  businessConfig(key: { id: $id }) {
    id
    businessName
    currency
    ticketWidthMm
    activePaymentMethods
    taxesEnabled
  }
}

# Roles disponibles, usados para sincronizar el usuario luego de iniciar sesion.
query ListRoles @auth(level: USER) {
  roles {
    id
    name
    description
  }
}

# Datos del usuario autenticado, sincronizados desde Firebase Authentication.
query GetCurrentUser @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    id
    name
    email
    isActive
    role {
      name
    }
  }
}

query ListUnitsOfMeasure @auth(level: USER) {
  unitOfMeasures(where: { isActive: { eq: true } }) {
    id
    name
    abbreviation
    type
  }
}

query ListIngredients @auth(level: USER) {
  ingredients(where: { isActive: { eq: true } }) {
    id
    name
    referenceCost
    minStock
    unitOfMeasure {
      id
      name
      abbreviation
    }
  }
}

query ListSuppliers @auth(level: USER) {
  suppliers(where: { isActive: { eq: true } }) {
    id
    name
    phone
    isFormal
  }
}

query ListProducts @auth(level: USER) {
  products(where: { isActive: { eq: true } }) {
    id
    name
    saleUnit
    salePrice
    currentCost
  }
}

query ListPurchases
@auth(level: USER, insecureReason: "Compras visibles para cualquier usuario logueado; el alta se restringe a administrador en el cliente.") {
  purchases(orderBy: [{ createdAt: DESC }]) {
    id
    date
    status
    subtotal
    taxAmount
    total
    paymentMethod
    notes
    supplier {
      id
      name
    }
  }
}

query GetPurchase($id: UUID!)
@auth(level: USER, insecureReason: "Compras visibles para cualquier usuario logueado; el alta se restringe a administrador en el cliente.") {
  purchase(key: { id: $id }) {
    id
    date
    status
    subtotal
    taxAmount
    total
    paymentMethod
    notes
    supplier {
      id
      name
    }
    items: purchaseItems_on_purchase {
      id
      quantity
      unitCost
      totalCost
      ingredient {
        id
        name
        unitOfMeasure {
          abbreviation
        }
      }
    }
  }
}

query ListInventoryMovements($limit: Int)
@auth(level: USER, insecureReason: "Movimientos de inventario visibles para cualquier usuario logueado (administrador/produccion).") {
  inventoryMovements(orderBy: [{ createdAt: DESC }], limit: $limit) {
    id
    itemType
    movementType
    quantity
    unitCost
    sourceType
    reason
    createdAt
    ingredient {
      id
      name
      unitOfMeasure {
        abbreviation
      }
    }
    product {
      id
      name
    }
  }
}
