# Mutaciones iniciales - Pan (Gestion de Panaderia)
# Se amplia por modulo en cada fase (ver docs/11-Plan-de-Implementacion-Firebase.md, Fase 5).

# La restriccion a solo administradores se aplica en el cliente (AuthGuard de /configuracion).
# Pendiente: granularidad por rol a nivel de conector para bloquear esta mutacion en el backend.
mutation UpsertBusinessConfig(
  $id: UUID!
  $businessName: String!
  $currency: String!
  $ticketWidthMm: Int!
  $activePaymentMethods: [String!]
  $taxesEnabled: Boolean!
)
@auth(level: USER, insecureReason: "Restringido a administradores en el cliente; pendiente aplicar a nivel de conector.") {
  businessConfig_upsert(
    data: {
      id: $id
      businessName: $businessName
      currency: $currency
      ticketWidthMm: $ticketWidthMm
      activePaymentMethods: $activePaymentMethods
      taxesEnabled: $taxesEnabled
      updatedAt_expr: "request.time"
    }
  )
}

# Sincroniza el usuario de Firebase Authentication con la tabla User de Postgres.
# Se llama despues de iniciar sesion. El id del usuario es siempre el auth.uid,
# asi que un usuario solo puede sincronizar su propia fila.
mutation UpsertUser($name: String!, $email: String!, $roleId: UUID!) @auth(level: USER) {
  user_upsert(
    data: {
      id_expr: "auth.uid"
      name: $name
      email: $email
      roleId: $roleId
      updatedAt_expr: "request.time"
    }
  )
}

mutation CreateUnitOfMeasure($name: String!, $abbreviation: String!, $type: String) @auth(level: USER) {
  unitOfMeasure_insert(data: { name: $name, abbreviation: $abbreviation, type: $type })
}

mutation CreateIngredient($name: String!, $unitOfMeasureId: UUID!, $referenceCost: Float, $minStock: Float)
@auth(level: USER) {
  ingredient_insert(
    data: {
      name: $name
      unitOfMeasureId: $unitOfMeasureId
      referenceCost: $referenceCost
      minStock: $minStock
    }
  )
}

mutation CreateSupplier($name: String!, $phone: String, $taxId: String, $legalName: String, $isFormal: Boolean)
@auth(level: USER) {
  supplier_insert(
    data: { name: $name, phone: $phone, taxId: $taxId, legalName: $legalName, isFormal: $isFormal }
  )
}

mutation CreateProduct($name: String!, $saleUnit: String, $salePrice: Float!) @auth(level: USER) {
  product_insert(data: { name: $name, saleUnit: $saleUnit, salePrice: $salePrice })
}

# Cabecera de compra. El total/subtotal se calculan en el cliente a partir de los items
# del borrador antes de enviar, ya que los items se agregan con AddPurchaseItem despues.
mutation CreatePurchase(
  $supplierId: UUID
  $date: Date!
  $subtotal: Float!
  $taxAmount: Float!
  $total: Float!
  $paymentMethod: String
  $notes: String
) @auth(level: USER) {
  purchase_insert(
    data: {
      supplierId: $supplierId
      userId_expr: "auth.uid"
      date: $date
      subtotal: $subtotal
      taxAmount: $taxAmount
      total: $total
      paymentMethod: $paymentMethod
      notes: $notes
    }
  )
}

# Agrega un item a una compra y genera el movimiento de inventario de entrada
# correspondiente en la misma operacion (regla: todo cambio de stock queda trazado).
mutation AddPurchaseItem($purchaseId: UUID!, $ingredientId: UUID!, $quantity: Float!, $unitCost: Float!, $totalCost: Float!)
@auth(level: USER) {
  purchaseItem_insert(
    data: { purchaseId: $purchaseId, ingredientId: $ingredientId, quantity: $quantity, unitCost: $unitCost, totalCost: $totalCost }
  )
  inventoryMovement_insert(
    data: {
      itemType: "ingredient"
      ingredientId: $ingredientId
      movementType: "entrada"
      quantity: $quantity
      unitCost: $unitCost
      sourceType: "purchase"
      sourceId: $purchaseId
      createdById_expr: "auth.uid"
    }
  )
}

# Ajuste manual de inventario. El motivo es obligatorio (regla de negocio).
mutation AdjustInventory(
  $itemType: String!
  $ingredientId: UUID
  $productId: UUID
  $movementType: String!
  $quantity: Float!
  $reason: String!
) @auth(level: USER) {
  inventoryMovement_insert(
    data: {
      itemType: $itemType
      ingredientId: $ingredientId
      productId: $productId
      movementType: $movementType
      quantity: $quantity
      sourceType: "adjustment"
      reason: $reason
      createdById_expr: "auth.uid"
    }
  )
}

mutation CreateRecipe($productId: UUID!, $name: String!, $expectedYield: Float!, $yieldUnit: String, $notes: String)
@auth(level: USER, insecureReason: "Alta de recetas restringida a administrador/produccion en el cliente.") {
  recipe_insert(
    data: { productId: $productId, name: $name, expectedYield: $expectedYield, yieldUnit: $yieldUnit, notes: $notes }
  )
}

mutation AddRecipeItem($recipeId: UUID!, $ingredientId: UUID!, $quantity: Float!, $unitOfMeasureId: UUID!)
@auth(level: USER, insecureReason: "Alta de items de receta restringida a administrador/produccion en el cliente.") {
  recipeItem_insert(
    data: { recipeId: $recipeId, ingredientId: $ingredientId, quantity: $quantity, unitOfMeasureId: $unitOfMeasureId }
  )
}

# Cabecera de lote de produccion. El costo se calcula en el cliente a partir de la receta
# (costo referencial de insumos escalado) antes de enviar.
mutation CreateProductionBatch(
  $recipeId: UUID!
  $productId: UUID!
  $date: Date!
  $plannedQuantity: Float!
  $actualQuantity: Float!
  $batchCost: Float!
  $unitCost: Float!
) @auth(level: USER) {
  productionBatch_insert(
    data: {
      recipeId: $recipeId
      productId: $productId
      userId_expr: "auth.uid"
      date: $date
      plannedQuantity: $plannedQuantity
      actualQuantity: $actualQuantity
      batchCost: $batchCost
      unitCost: $unitCost
      status: "registrado"
    }
  )
}

# Descuenta un insumo del inventario por produccion (regla: todo cambio de stock queda trazado).
mutation RegisterProductionConsumption($ingredientId: UUID!, $quantity: Float!, $unitCost: Float, $sourceId: UUID!)
@auth(level: USER) {
  inventoryMovement_insert(
    data: {
      itemType: "ingredient"
      ingredientId: $ingredientId
      movementType: "salida"
      quantity: $quantity
      unitCost: $unitCost
      sourceType: "production"
      sourceId: $sourceId
      createdById_expr: "auth.uid"
    }
  )
}

# Entrada de productos terminados generados por el lote de produccion.
mutation RegisterProductionOutput($productId: UUID!, $quantity: Float!, $unitCost: Float, $sourceId: UUID!)
@auth(level: USER) {
  inventoryMovement_insert(
    data: {
      itemType: "product"
      productId: $productId
      movementType: "entrada"
      quantity: $quantity
      unitCost: $unitCost
      sourceType: "production"
      sourceId: $sourceId
      createdById_expr: "auth.uid"
    }
  )
}

mutation UpdateProductCost($productId: UUID!, $currentCost: Float!)
@auth(level: USER, insecureReason: "Actualizacion de costo generada por el registro de produccion; restringida a administrador/produccion en el cliente.") {
  product_update(key: { id: $productId }, data: { currentCost: $currentCost })
}
